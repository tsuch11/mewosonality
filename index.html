<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Which Cat you are?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Itim&display=swap');
    :root{
      --blue:#C7D3DB;
      --taupe:#A79A8A;
      --cream:#FCF7DF;
      --dark:#3E3630;
      --bg:#f3f5f6;
      --card:#ffffff;
      --line:#e6e8ea;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Itim",sans-serif;
      background:var(--bg);
      color:var(--dark);
    }
    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:0 16px 48px;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .wrap-landing{
      max-width:none;
      margin:0;
      padding:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,#f5f7f8 0%, #f3f5f6 40%, #eff3f5 100%);
    }
    .head{
      background:transparent;
      border:none;
      border-radius:0;
      padding:0 0 14px 0;
      margin-bottom:0;
    }
    h1{
      margin:0 0 6px;
      font-family:"Itim","Noto Sans Thai",sans-serif;
      font-size:24px;
      letter-spacing:.2px;
    }
    .small{margin:0;color:#5b534d;font-size:14px}
    .meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-top:10px;
    }
    .chip{
      background:#fff;
      border:1px solid #ebe6d5;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
    }
    .progress{
      margin-top:0;
      height:10px;
      background:#eceff1;
      border-radius:999px;
      overflow:visible;
      flex:1;
      max-width:320px;
      margin:0 auto;
      position:relative;
    }
    .bar{
      width:0%;
      height:100%;
      background:var(--taupe);
      border-radius:999px;
      transition:width .4s cubic-bezier(.4,0,.2,1);
      position:relative;
      overflow:visible;
    }
    /* ====== pixel cat runner ====== */
    .cat-runner{
      position:absolute;
      right:-16px;
      top:50%;
      transform:translateY(-35%);
      width:36px;
      height:36px;
      pointer-events:none;
      z-index:10;
      image-rendering:pixelated;
      animation:catBounce .45s steps(2,end) infinite;
    }
    .cat-runner svg{
      width:100%;
      height:100%;
      image-rendering:pixelated;
    }
    @keyframes catBounce{
      0%,100%{ transform:translateY(-35%); }
      50%    { transform:translateY(-42%); }
    }

    .card{
      background:transparent;
      border:none;
      border-radius:0;
      padding:0;
      box-shadow:none;
    }
    .q-no{
      font-size:13px;
      color:#70757a;
      margin-bottom:8px;
      display:none;
    }
    .q-title{
      margin:0 0 14px;
      font-size:19px;
      line-height:1.4;
      text-align:center;
    }
    #quizCard{
      max-width:640px;
      margin:0 auto;
    }
    #options{
      max-width:540px;
      margin:0 auto;
    }

    /* เผื่อใส่รูปในอนาคต */
    .question-image{
      width:100%;
      max-height:260px;
      object-fit:cover;
      border-radius:10px;
      border:1px solid #ddd;
      margin:0 0 10px;
      display:none;
    }
    .question-image.show{display:block}

    .opt{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0;
      width:100%;
      max-width:520px;
      text-align:center;
      border:1px solid #dfe4e7;
      background:#fff;
      border-radius:10px;
      padding:9px 12px;
      margin:0 auto 8px;
      cursor:pointer;
      color:var(--dark);
      font-size:14px;
      font-weight:500;
      font-family:"Itim",sans-serif;
    }
    .opt:hover{background:#f8fafb}
    .actions{
      display:flex;
      gap:8px;
      margin-top:12px;
    }
    .btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
      font-size:14px;
    }
    .btn-back{
      background:#e6edf1;
      color:#2d2d2d;
    }
    .btn-next{
      background:var(--dark);
      color:#fff;
      margin-left:auto;
      display:none;
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .question-anim{
      animation:questionEnter .28s ease;
    }
    .question-exit{
      animation:questionExit .24s ease forwards;
    }
    @keyframes questionEnter{
      from{
        opacity:0;
        transform:translateY(8px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
    @keyframes questionExit{
      from{
        opacity:1;
        transform:translateY(0);
      }
      to{
        opacity:0;
        transform:translateY(-8px);
      }
    }

    .result{
      display:none;
      margin-top:14px;
      background:transparent;
      border:none;
      border-radius:16px;
      padding:0;
      box-shadow:none;
    }
    .result-head{
      text-align:center;
      margin-bottom:10px;
    }
    .result-title{
      margin:0;
      font-size:44px;
      line-height:1.05;
      letter-spacing:.2px;
    }
    .result-subtitle{
      margin:2px 0 0;
      font-size:28px;
      letter-spacing:4px;
    }
    .result-card{
      background:#fff;
      border:none;
      border-radius:26px;
      padding:18px;
      box-shadow:none;
    }
    .result-image{
      width:min(62%, 260px);
      height:auto;
      max-height:220px;
      object-fit:contain;
      object-position:center;
      border-radius:14px;
      border:none;
      margin:6px auto 12px;
      background:transparent;
      padding:0;
      display:block;
    }
    .result-desc{
      margin:0;
      font-size:20px;
      text-align:center;
    }
    .result-explain{
      margin-top:10px;
      background:#fafafa;
      border:1px solid #e8ecef;
      border-radius:12px;
      padding:12px 14px;
      color:#4f565c;
      line-height:1.55;
      font-size:18px;
    }
.result-stats {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0; /* ใช้ border แทน gap เพื่อความแม่นยำ */
    }
    .stat {
      flex: 1;
      border: none;
      padding: 5px 10px;
      text-align: center;
      font-size: 16px;
      background: transparent;
      position: relative;
      color: var(--dark);
    }
    .stat:not(:last-child)::after {
      content: "";
      position: absolute;
      right: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background-color: #000000; /* สีของขีดกั้น */
    }
    .result-quote{
      margin-top:12px;
      font-size:18px;
      color:#6b6f74;
      text-align:center;
      background:transparent;
      border:none;
      border-radius:10px;
      padding:10px 12px;
    }
    .result-rare{
      margin-top:10px;
      text-align:center;
    }
    .stars{
      color:#ef954b;
      font-size:20px;
      letter-spacing:2px;
      line-height:1;
    }
    .rare-pill{
      margin-top:4px;
      display:inline-block;
      border:none;
      color:#ea9250;
      border-radius:999px;
      padding:3px 18px;
      font-size:14px;
      background:#fff4ea;
    }
    .retry-btn{
      margin-top:16px;
      border:none;
      background:var(--dark);
      color:#fff;
      border-radius:12px;
      padding:10px 16px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      display:block;
      margin-left:auto;
      margin-right:auto;
    }
    .crew-wrap{
      margin-top:14px;
      border-top:none;
      padding-top:12px;
    }
    .crew-title{
      text-align:center;
      margin:0 0 10px;
      font-size:22px;
    }
    .crew-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      max-width:260px;
      margin:0 auto;
    }
    .crew-item{
      text-align:center;
      font-size:11px;
      color:#666d73;
    }
    .crew-item img{
      width:100%;
      max-width:58px;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:999px;
      border:none;
      background:#f4f7f9;
      margin:0 auto 4px;
      display:block;
    }
    .landing{
      width:min(980px, 92vw);
      padding:32px 20px;
      text-align:center;
    }
    .landing-image{
      width:min(760px, 88vw);
      max-height:440px;
      object-fit:contain;
      border-radius:0;
      background:transparent;
      border:none;
      margin:0 auto 14px;
      display:block;
    }
    .landing-title{
      margin:0 0 8px;
      font-size:clamp(30px,4vw,46px);
      line-height:1.2;
    }
    .landing-sub{
      margin:0 0 14px;
      color:#5a5f64;
      font-size:15px;
    }
    .start-btn{
      border:none;
      background:var(--dark);
      color:#fff;
      border-radius:12px;
      padding:11px 18px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      min-width:180px;
    }
    @media (max-width:720px){
      body{
        font-size:18px;
      }
      .landing{
        padding:22px 16px;
      }
      .landing-image{
        max-height:320px;
      }
      .landing-sub{
        font-size:18px;
      }
      h1{
        font-size:28px;
      }
      .small{
        font-size:17px;
      }
      .chip{
        font-size:14px;
      }
      .q-title{
        font-size:24px;
      }
      .opt{
        font-size:16px;
        padding:10px 12px;
      }
      .btn{
        font-size:18px;
      }
      .result-title{font-size:34px}
      .result-subtitle{font-size:24px;letter-spacing:3px}
      .result-desc{font-size:22px}
      .result-explain{font-size:19px}
      .stat{
        font-size:18px;
      }
      .result-quote{
        font-size:20px;
      }
      .rare-pill{
        font-size:16px;
      }
      .crew-title{
        font-size:24px;
      }
      .crew-item{
        font-size:13px;
      }
      .result-stats {
        display: flex !important; /* บังคับให้เป็นแนวนอนในมือถือ */
        flex-direction: row !important;
        grid-template-columns: none !important;
        margin-top: 20px;
      }
      .stat {
        font-size: 15px; /* ขนาดตัวอักษรในมือถือ */
        padding: 4px 8px;
      }
      .crew-grid{grid-template-columns:repeat(2,1fr)}
    }

    /* ====== retro popup ====== */
    .popup-overlay{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:999;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(3px);
      -webkit-backdrop-filter:blur(3px);
      animation:fadeInOverlay .25s ease;
    }
    @keyframes fadeInOverlay{
      from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)}
    }
    .popup-window{
      font-family:"Courier New", monospace;
      background:#FCF7DF;
      border:2px solid #A79A8A;
      box-shadow:4px 4px 0 #A79A8A, inset 1px 1px 0 #ffffff;
      width:min(300px, 86vw);
      image-rendering:pixelated;
    }
    .popup-titlebar{
      background:#A79A8A;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:4px 6px;
      font-size:11px;
      color:#FCF7DF;
      font-weight:bold;
      letter-spacing:.5px;
    }
    .popup-titlebar-left{display:flex;align-items:center;gap:4px;}
    .popup-titlebar-btn{
      width:13px;height:13px;
      background:#FCF7DF;
      border:1px solid #3E3630;
      font-size:7px;
      display:flex;align-items:center;justify-content:center;
      color:#3E3630;
    }
    .popup-body{
      padding:18px 16px 16px;
      text-align:center;
    }
    .popup-body p{
      margin:0 0 2px;
      font-size:12px;
      color:#3E3630;
      line-height:1.6;
    }
    .popup-body .popup-sub{
      font-size:11px;
      color:#A79A8A;
      margin-bottom:12px;
      font-style:italic;
    }
    .popup-ok{
      margin-top:14px;
      background:#FCF7DF;
      border:2px solid #3E3630;
      box-shadow:2px 2px 0 #3E3630;
      padding:5px 32px;
      font-family:"Courier New", monospace;
      font-size:13px;
      font-weight:bold;
      color:#3E3630;
      cursor:pointer;
      letter-spacing:1px;
      display:inline-block;
    }
    .popup-ok:active{box-shadow:none;transform:translate(2px,2px);}
  </style>
</head>
<body>
  <div class="wrap wrap-landing" id="mainWrap">
    <section class="landing" id="landing">
      <img class="landing-image" src="assets/cats/cover.gif" alt="Reborn as a cat" />
      <h2 class="landing-title">Which Cat you are? </h2>
      <p class="landing-sub">แบบทดสอบสั้น ๆ ดูว่าคาแรกเตอร์คุณเหมือนแมวสายไหน</p>
      <button class="start-btn" id="startBtn">เริ่มเลย</button>
    </section>

    <section class="head" id="quizHead" style="display:none;">
      <div class="progress">
        <div class="bar" id="bar">
          <div class="cat-runner" id="catRunner">
            <svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
              <g>
                <!-- หู -->
                <rect x="1" y="0" width="2" height="2" fill="#1a1a1a"/>
                <rect x="9" y="0" width="2" height="2" fill="#1a1a1a"/>
                <!-- หัวกลม -->
                <rect x="1" y="1" width="10" height="1" fill="#1a1a1a"/>
                <rect x="0" y="2" width="12" height="6" fill="#1a1a1a"/>
                <rect x="1" y="8" width="10" height="1" fill="#1a1a1a"/>
                <!-- ตา -->
                <rect x="2" y="4" width="2" height="2" fill="#f5c842"/>
                <rect x="8" y="4" width="2" height="2" fill="#f5c842"/>
                <!-- จมูก/ปาก -->
                <rect x="5" y="6" width="2" height="1" fill="#A79A8A"/>
              </g>
            </svg>
          </div>
        </div>
      </div>
    </section>

    <section class="card" id="quizCard" style="display:none;">
      <div class="q-no" id="qNo"></div>
      <h2 class="q-title" id="qTitle"></h2>

      <!-- อนาคต: ถ้าข้อไหนมีรูป ใส่ path ใน data.image -->
      <img id="qImage" class="question-image" alt="question image" />

      <div id="options"></div>

      <div class="actions">
        <button class="btn btn-back" id="backBtn">ย้อนกลับ</button>
        <button class="btn btn-next" id="nextBtn" disabled>ถัดไป</button>
      </div>
    </section>

    <section id="result" class="result"></section>
  </div>

  <script>
    const questions = [
      { q:"เวลาเครียดที่สุด คุณมักจะ…", image:"", opts:{A:"หายไปอยู่คนเดียว",B:"หาอะไรอร่อยกิน",C:"ระบายออกทันที",D:"หาใครสักคนอยู่ข้าง ๆ"} },
      { q:"ถ้ามีคนมาชมคุณต่อหน้า คุณจะ…", image:"", opts:{A:"เขินจนทำตัวไม่ถูก",B:"รับคำชมเต็มที่",C:"แกล้งกวนกลับ",D:"ทำเป็นไม่สนใจ"} },
      { q:"คุณชอบคนแบบไหนมากที่สุด", image:"", opts:{A:"คนอบอุ่น",B:"คนตลก",C:"คนลึกลับน่าค้นหา",D:"คนที่เข้าใจเราโดยไม่ต้องพูดเยอะ"} },
      { q:"ถ้าเลือกที่นอนในบ้านได้ คุณจะเลือก…", image:"", opts:{A:"เตียงนุ่ม ๆ",B:"ริมหน้าต่าง",C:"มุมแปลก ๆ ที่ไม่มีใครคิดถึง",D:"ใกล้คนที่รัก"} },
      { q:"ในกลุ่มเพื่อน คุณมักเป็น…", image:"", opts:{A:"คนเงียบแต่ฟังทุกอย่าง",B:"ตัวสร้างเสียงหัวเราะ",C:"คนชอบแกล้งคนอื่น",D:"คนคอยดูแลเพื่อน"} },
      { q:"ถ้ามีคนทำให้เสียใจ คุณจะ…", image:"", opts:{A:"เก็บไว้คนเดียว",B:"พยายามลืมเร็ว ๆ",C:"ประชดกลับ",D:"แอบร้องไห้ตอนอยู่คนเดียว"} },
      { q:"คุณชอบบรรยากาศแบบไหน", image:"", opts:{A:"ฝนตก เงียบ ๆ",B:"คาเฟ่คึกคัก",C:"กลางคืนและไฟเมือง",D:"บ้านที่มีคนรออยู่"} },
      { q:"ถ้าเป็นแมว คุณคิดว่าตัวเองจะ…", image:"", opts:{A:"นอนทั้งวัน",B:"วิ่งเล่นไม่หยุด",C:"เดินเชิด ๆ ไม่สนใคร",D:"ติดเจ้าของแจ"} },
      { q:"เวลาเริ่มชอบใคร คุณจะ…", image:"", opts:{A:"แอบมอง",B:"เข้าหาก่อน",C:"ชอบแกล้งเขา",D:"ดูแลแบบเนียน ๆ"} },
      { q:"คุณกลัวอะไรมากที่สุด", image:"", opts:{A:"การถูกทอดทิ้ง",B:"ความน่าเบื่อ",C:"การเสียศักดิ์ศรี",D:"การไม่มีใครเข้าใจ"} },
      { q:"ถ้ามีวันหยุด 1 วันเต็ม คุณจะ…", image:"", opts:{A:"นอนพัก",B:"ออกไปเที่ยว",C:"หาอะไรใหม่ ๆ ทำ",D:"ใช้เวลากับคนสำคัญ"} },
      { q:"ถ้าคนรักงอนคุณ คุณจะ…", image:"", opts:{A:"ง้อเงียบ ๆ",B:"ซื้อของอร่อยให้",C:"แกล้งหยอกจนเขาหายงอน",D:"กอดก่อนเลย"} },
    ];

    const mainResults = {
      A:{title:"แมวเปอร์เซีย",enTitle:"PERSIAN CAT",image:"assets/cats/persian.jpg",desc:"นิ่ง สุขุม มีโลกส่วนตัวสูง อ่อนโยนแต่เปิดใจยาก",explain:"คุณตัดสินใจจากความรู้สึกภายในมากกว่าความเร่งรีบภายนอก จึงต้องการความสัมพันธ์ที่มั่นคงและพื้นที่ปลอดภัย เมื่อไว้ใจใครแล้วจะดูแลแบบลึกและจริงใจมาก",stats:["อ่อนไหว","มั่นคง","ช่างคิด"],quote:"เงียบ...แต่รักจริงไม่เล่น",rarity:3,traits:["introvert","อ่อนไหว","รักความสงบ","ขี้คิด"]},
      B:{title:"แมวส้มจอมป่วน",enTitle:"ORANGE CAT",image:"assets/cats/orange.jpg",desc:"พลังงานสูง เข้ากับคนง่าย ขี้เล่นและใจดี",explain:"คุณเป็นคนส่งพลังบวกให้คนรอบตัวเก่ง มีความกล้าเริ่มบทสนทนาและชอบสร้างบรรยากาศสนุก ๆ แม้ภายนอกสดใส แต่ลึก ๆ ก็ต้องการคนที่รับฟังด้านอ่อนโยนของคุณเช่นกัน",stats:["ขี้เล่น","อบอุ่น","เฟรนด์ลี่"],quote:"ยิ้มไว้ก่อน เดี๋ยวทุกอย่างก็ดีขึ้น",rarity:2,traits:["social สูง","ตลก","ขี้อ้อน","กินเก่ง","ใจดี"]},

    };

      B: [

      ],

        {name:"แมวดำลึกลับ", image:"assets/cats/black.jpg"},

      ],
      "B+D": [

        {name:"แร็กดอลล์", image:"assets/cats/ragdoll.jpg"},
        {name:"บริติชชอร์ตแฮร์", image:"assets/cats/british.jpg"}

      ],
      "A+D": [

    const fallbackImage = "634416222_946939267760313_225817689217806069_n.jpg";

    const qNo = document.getElementById("qNo");
    const qTitle = document.getElementById("qTitle");
    const qImage = document.getElementById("qImage");
    const options = document.getElementById("options");
    const landing = document.getElementById("landing");
    const startBtn = document.getElementById("startBtn");
    const quizHead = document.getElementById("quizHead");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const bar = document.getElementById("bar");
    const result = document.getElementById("result");
    const quizCard = document.getElementById("quizCard");
    const mainWrap = document.getElementById("mainWrap");

    const answers = Array(questions.length).fill(null);
    let current = 0;
    let isTransitioning = false;

    function renderQuestion(){
      const item = questions[current];
      qNo.textContent = `ข้อ ${current + 1} จาก ${questions.length}`;
      qTitle.textContent = item.q;

      bar.style.width = `${((current + 1) / questions.length) * 100}%`;

      if(item.image){
        qImage.src = item.image;
        qImage.classList.add("show");
      } else {
        qImage.src = "";
        qImage.classList.remove("show");
      }

      options.innerHTML = Object.entries(item.opts).map(([k,v]) => `
        <button class="opt" data-choice="${k}">
          <span>${v}</span>
        </button>
      `).join("");
      quizCard.classList.remove("question-exit");
      quizCard.classList.remove("question-anim");
      requestAnimationFrame(() => quizCard.classList.add("question-anim"));

      backBtn.disabled = current === 0;
      highlightSelected();
    }

    function highlightSelected(){
      const selected = answers[current];
      document.querySelectorAll(".opt").forEach(btn => {
        const isSelected = btn.dataset.choice === selected;
        btn.style.borderColor = isSelected ? "var(--taupe)" : "#dfe4e7";
        btn.style.background = isSelected ? "#f8f3ed" : "#fff";
      });
    }

    options.addEventListener("click",(e)=>{
      const btn = e.target.closest(".opt");
      if(!btn || isTransitioning) return;
      isTransitioning = true;
      answers[current] = btn.dataset.choice;
      btn.animate(
        [{ transform: "scale(1)" }, { transform: "scale(0.985)" }, { transform: "scale(1)" }],
        { duration: 140, easing: "ease-out" }
      );
      highlightSelected();
      quizCard.classList.remove("question-anim");
      quizCard.classList.add("question-exit");
      setTimeout(() => {
        if(current < questions.length - 1){
          current++;
          renderQuestion();
          isTransitioning = false;
        } else {
          showResult();
          isTransitioning = false;
        }
      }, 280);
    });

    backBtn.addEventListener("click",()=>{
      if(current > 0){
        current--;
        renderQuestion();
      }
    });

    function showResult(){
      const score = {A:0,B:0,C:0,D:0};
      answers.forEach(a=>score[a]++);

      const sorted = Object.entries(score).sort((a,b)=>b[1]-a[1]);
      const [topKey, topScore] = sorted[0];
      const secondScore = sorted[1][1];

      let out;
      let resultKey;
      if(topScore === secondScore){
        const pair = [sorted[0][0], sorted[1][0]].sort().join("+");
        out = tieResults[pair] || mainResults[topKey];
        resultKey = tieResults[pair] ? pair : topKey;
      } else {
        out = mainResults[topKey];
        resultKey = topKey;
      }

      const stars = "★".repeat(out.rarity || 3);
      const crew = (crewMap[resultKey] || crewMap[topKey] || []).slice(0, 3).map(cat => `
        <div class="crew-item">
          <img src="${cat.image}" alt="${cat.name}" onerror="this.src='${fallbackImage}'">
          <div>${cat.name}</div>
        </div>
      `).join("");
      const stats = (out.stats || out.traits || []).slice(0,3).map(stat => `
        <div class="stat">${stat}</div>
      `).join("");

      quizCard.style.display = "none";
      quizHead.style.display = "none";

      // show retro popup first
      const popup = document.getElementById("catPopup");
      popup.style.display = "flex";
      document.getElementById("popupOkBtn").onclick = () => {
        popup.style.display = "none";
        result.style.display = "block";
      };
      result.innerHTML = `
        <div class="result-head">
          <h2 class="result-title">${out.title}</h2>
          <p class="result-subtitle">${out.enTitle || "CAT PERSONALITY"}</p>
        </div>
        <div class="result-card">
          <img class="result-image" src="${out.image || fallbackImage}" alt="${out.title}" onerror="this.src='${fallbackImage}'">
          <p class="result-desc">${out.desc}</p>
          <div class="result-explain">${out.explain}</div>
          <div class="result-stats">${stats}</div>
          <div class="result-quote">"${out.quote || "นี่แหละตัวตนแมวในแบบคุณ"}"</div>
          
          
          <button class="retry-btn" id="retryBtn">ลองอีกครั้ง</button>
        </div>
      `;
      const retryBtn = document.getElementById("retryBtn");
      if (retryBtn) {
        retryBtn.addEventListener("click", resetQuiz);
      }
    }

    function resetQuiz(){
      answers.fill(null);
      current = 0;
      result.style.display = "none";
      quizCard.style.display = "block";
      quizHead.style.display = "block";
      renderQuestion();
    }

    startBtn.addEventListener("click", ()=>{
      landing.style.display = "none";
      mainWrap.classList.remove("wrap-landing");
      mainWrap.classList.add("wrap");
      quizHead.style.display = "block";
      quizCard.style.display = "block";
      renderQuestion();
    });
  </script>
