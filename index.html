<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Which Cat you are?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Itim&display=swap');
    :root{
      --blue:#C7D3DB;
      --taupe:#A79A8A;
      --cream:#FCF7DF;
      --dark:#3E3630;
      --bg:#f3f5f6;
      --card:#ffffff;
      --line:#e6e8ea;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Itim",sans-serif;
      background:var(--bg);
      color:var(--dark);
    }
    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:0 16px 48px;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .wrap-landing{
      max-width:none;
      margin:0;
      padding:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,#f5f7f8 0%, #f3f5f6 40%, #eff3f5 100%);
    }
    .head{
      background:transparent;
      border:none;
      border-radius:0;
      padding:0 0 14px 0;
      margin-bottom:0;
    }
    h1{
      margin:0 0 6px;
      font-family:"Itim","Noto Sans Thai",sans-serif;
      font-size:24px;
      letter-spacing:.2px;
    }
    .small{margin:0;color:#5b534d;font-size:14px}
    .meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-top:10px;
    }
    .chip{
      background:#fff;
      border:1px solid #ebe6d5;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
    }
    .progress{
      margin-top:0;
      height:10px;
      background:#eceff1;
      border-radius:999px;
      overflow:visible;
      flex:1;
      max-width:320px;
      margin:0 auto;
      position:relative;
    }
    .bar{
      width:0%;
      height:100%;
      background:var(--taupe);
      border-radius:999px;
      transition:width .4s cubic-bezier(.4,0,.2,1);
      position:relative;
      overflow:visible;
    }
    /* ====== pixel cat runner ====== */
    .cat-runner{
      position:absolute;
      right:-16px;
      top:50%;
      transform:translateY(-35%);
      width:36px;
      height:36px;
      pointer-events:none;
      z-index:10;
      image-rendering:pixelated;
      animation:catBounce .45s steps(2,end) infinite;
    }
    .cat-runner svg{
      width:100%;
      height:100%;
      image-rendering:pixelated;
    }
    @keyframes catBounce{
      0%,100%{ transform:translateY(-35%); }
      50%    { transform:translateY(-42%); }
    }

    .card{
      background:transparent;
      border:none;
      border-radius:0;
      padding:0;
      box-shadow:none;
    }
    .q-no{
      font-size:13px;
      color:#70757a;
      margin-bottom:8px;
      display:none;
    }
    .q-title{
      margin:0 0 14px;
      font-size:19px;
      line-height:1.4;
      text-align:center;
    }
    #quizCard{
      max-width:640px;
      margin:0 auto;
    }
    #options{
      max-width:520px;
      margin:0 auto;
    }

    /* เผื่อใส่รูปในอนาคต */
    .question-image{
      width:100%;
      max-height:260px;
      object-fit:cover;
      border-radius:10px;
      border:1px solid #ddd;
      margin:0 0 10px;
      display:none;
    }
    .question-image.show{display:block}

    .opt{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0;
      width:100%;
      max-width:none;
      text-align:center;
      border:1px solid #dfe4e7;
      background:#fff;
      border-radius:999px;
      padding:12px 20px;
      margin:0 auto 8px;
      cursor:pointer;
      color:var(--dark);
      font-size:14px;
      font-weight:500;
      font-family:"Itim",sans-serif;
    }
    .opt:hover{background:#f8fafb}
    .actions{
      display:flex;
      gap:8px;
      margin-top:12px;
    }
    .btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
      font-size:14px;
      font-family:"Itim",sans-serif;
    }
    .btn-back{
      background:#e6edf1;
      color:#2d2d2d;
    }
    .btn-next{
      background:var(--dark);
      color:#fff;
      margin-left:auto;
      display:none;
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .question-anim{
      animation:questionEnter .28s ease;
    }
    .question-exit{
      animation:questionExit .24s ease forwards;
    }
    @keyframes questionEnter{
      from{
        opacity:0;
        transform:translateY(8px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
    @keyframes questionExit{
      from{
        opacity:1;
        transform:translateY(0);
      }
      to{
        opacity:0;
        transform:translateY(-8px);
      }
    }

    /* ====== result card redesign ====== */
    .result{
      display:none;
      padding:20px 0 40px;
    }
    /* outer card */
    .result-card{
      background:#FCF7DF;
      border:2px solid #A79A8A;
      border-radius:24px;
      max-width:520px;
      margin:0 auto;
      overflow:hidden;
      box-shadow: 0 8px 32px rgba(62,54,48,0.10), 0 2px 8px rgba(167,154,138,0.15);
      position:relative;
    }
    /* top accent bar */
    .result-card::before{
      content:"";
      display:block;
      height:6px;
      background: linear-gradient(90deg, #C7D3DB, #A79A8A, #C7D3DB);
    }
    /* image section */
    .result-img-wrap{
      background: linear-gradient(180deg, #C7D3DB 0%, #dce6eb 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 20px 20px;
      position:relative;
    }
    .result-image{
      width:min(55%, 200px);
      height:auto;
      max-height:200px;
      object-fit:contain;
      filter:drop-shadow(0 6px 18px rgba(62,54,48,0.18));
      display:block;
      margin:0 auto;
      animation:resultCatFloat 3s ease-in-out infinite;
    }
    @keyframes resultCatFloat{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-7px);}
    }
    /* rarity badge */
      position:absolute;
      top:14px;
      right:16px;
      background:#3E3630;
      color:#FCF7DF;
      font-family:"Courier New",monospace;
      font-size:10px;
      letter-spacing:1.5px;
      padding:3px 10px;
      border-radius:999px;
    }
    /* body section */
    .result-body{
      padding:20px 24px 24px;
    }
    .result-head{
      text-align:center;
      margin-bottom:14px;
      padding-bottom:14px;
      border-bottom: 1px solid #d5cfc4;
    }
    .result-title{
      margin:0 0 4px;
      font-size:34px;
      color:#3E3630;
      line-height:1.1;
    }
    .result-subtitle{
      margin:0;
      font-size:13px;
      letter-spacing:3px;
      color:#A79A8A;
      font-family:"Courier New",monospace;
    }
    .result-desc{
      font-size:17px;
      text-align:center;
      color:#3E3630;
      margin:0 0 12px;
      font-weight:600;
      line-height:1.5;
    }
    .result-explain{
      font-size:15px;
      line-height:1.65;
      color:#5a5048;
      background:rgba(199,211,219,0.25);
      border-left:3px solid #A79A8A;
      border-radius:0 8px 8px 0;
      padding:10px 14px;
      margin:0 0 14px;
    }
    /* stat pills */
    .result-stats{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .stat{
      background:#3E3630;
      color:#FCF7DF;
      border-radius:999px;
      padding:5px 14px;
      font-size:13px;
      font-family:"Itim",sans-serif;
    }
    /* quote */
    .result-quote{
      text-align:center;
      font-size:14px;
      color:#A79A8A;
      font-style:italic;
      margin:0 0 18px;
      font-family:"Itim",sans-serif;
    }
    /* retry */
    .retry-btn{
      display:block;
      margin:0 auto;
      border:2px solid #3E3630;
      background:#3E3630;
      color:#FCF7DF;
      border-radius:999px;
      padding:10px 32px;
      font-size:15px;
      font-weight:700;
      font-family:"Itim",sans-serif;
      cursor:pointer;
      letter-spacing:.5px;
      transition:background .2s, color .2s;
    }
    .retry-btn:hover{
      background:#FCF7DF;
      color:#3E3630;
    }
    /* crew section */
    .crew-wrap{
      max-width:520px;
      margin:16px auto 0;
      text-align:center;
    }
    .crew-title{
      font-size:16px;
      letter-spacing:2px;
      color:#A79A8A;
      font-family:"Courier New",monospace;
      margin:0 0 12px;
    }
    .crew-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }
    .crew-item{
      text-align:center;
      font-size:11px;
      color:#3E3630;
      background:#FCF7DF;
      border:1px solid #d5cfc4;
      border-radius:14px;
      padding:10px 6px 8px;
    }
    .crew-item img{
      width:64px;
      height:64px;
      object-fit:cover;
      border-radius:999px;
      border:2px solid #A79A8A;
      background:#C7D3DB;
      margin:0 auto 6px;
      display:block;
    }
    .result-rare{ display:none; }
    .stars{ display:none; }
    .rare-pill{ display:none; }
    .landing{
      width:min(980px, 92vw);
      padding:32px 20px;
      text-align:center;
    }
    .landing-image{
      width:min(760px, 88vw);
      max-height:440px;
      object-fit:contain;
      border-radius:0;
      background:transparent;
      border:none;
      margin:0 auto 14px;
      display:block;
    }
    .landing-title{
      margin:0 0 8px;
      font-size:clamp(30px,4vw,46px);
      line-height:1.2;
    }
    .landing-sub{
      margin:0 0 14px;
      color:#5a5f64;
      font-size:15px;
    }
    .start-btn{
      border:none;
      background:var(--dark);
      color:#fff;
      border-radius:12px;
      padding:11px 18px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      min-width:180px;
    }
    @media (max-width:720px){
      body{
        font-size:18px;
      }
      .landing{
        padding:22px 16px;
      }
      .landing-image{
        max-height:320px;
      }
      .landing-sub{
        font-size:18px;
      }
      h1{
        font-size:28px;
      }
      .small{
        font-size:17px;
      }
      .chip{
        font-size:14px;
      }
      .q-title{
        font-size:24px;
      }
      .opt{
        font-size:16px;
        padding:10px 12px;
      }
      .btn{
        font-size:18px;
      }
      .result-title{font-size:30px}
      .result-subtitle{font-size:12px;letter-spacing:3px}
      .result-desc{font-size:17px}
      .result-explain{font-size:15px}
      .stat{font-size:13px;}
      .result-quote{font-size:14px;}
      .crew-title{font-size:13px;}
      .crew-item{font-size:11px;}
      .result-stats {
        display: flex !important;
        flex-direction: row !important;
      }
      .crew-grid{grid-template-columns:repeat(3,1fr)}
    }

    @media (min-width:721px){
      .q-title{
        font-size:26px;
      }
      .opt{
        font-size:18px;
        padding:14px 20px;
        margin-bottom:10px;
      }
      .btn{
        font-size:17px;
        padding:12px 18px;
      }
      .progress{
        max-width:520px;
        height:14px;
      }
      .cat-runner{
        width:42px;
        height:42px;
      }
      .popup-window{
        width:min(520px, 86vw);
      }
      .popup-body p{
        font-size:16px;
      }
      .popup-body .popup-sub{
        font-size:13px;
      }
      .popup-ok{
        font-size:16px;
        padding:7px 44px;
      }
      .popup-titlebar{
        font-size:13px;
        padding:5px 8px;
      }
      .popup-titlebar-btn{
        width:16px;
        height:16px;
        font-size:9px;
      }
    }

    @keyframes popupCatFloat{
      0%,100%{ transform:translateY(0); }
      50%    { transform:translateY(-4px); }
    }
    /* ====== retro popup ====== */
    .popup-overlay{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:999;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(3px);
      -webkit-backdrop-filter:blur(3px);
      animation:fadeInOverlay .25s ease;
    }
    @keyframes fadeInOverlay{
      from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)}
    }
    .popup-window{
      font-family:"Courier New", monospace;
      background:#FCF7DF;
      border:2px solid #A79A8A;
      box-shadow:4px 4px 0 #A79A8A, inset 1px 1px 0 #ffffff;
      width:min(300px, 86vw);
      image-rendering:pixelated;
    }
    .popup-titlebar{
      background:#A79A8A;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:4px 6px;
      font-size:11px;
      color:#FCF7DF;
      font-weight:bold;
      letter-spacing:.5px;
    }
    .popup-titlebar-left{display:flex;align-items:center;gap:4px;}
    .popup-titlebar-btn{
      width:13px;height:13px;
      background:#FCF7DF;
      border:1px solid #3E3630;
      font-size:7px;
      display:flex;align-items:center;justify-content:center;
      color:#3E3630;
    }
    .popup-body{
      padding:24px 24px 20px;
      text-align:center;
    }
    .popup-body p{
      margin:0 0 2px;
      font-size:12px;
      color:#3E3630;
      line-height:1.6;
    }
    .popup-body .popup-sub{
      font-size:11px;
      color:#A79A8A;
      margin-bottom:12px;
      font-style:italic;
    }
    .popup-ok{
      margin-top:14px;
      background:#FCF7DF;
      border:2px solid #3E3630;
      box-shadow:2px 2px 0 #3E3630;
      padding:5px 32px;
      font-family:"Courier New", monospace;
      font-size:13px;
      font-weight:bold;
      color:#3E3630;
      cursor:pointer;
      letter-spacing:1px;
      display:inline-block;
    }
    .popup-ok:active{box-shadow:none;transform:translate(2px,2px);}
  </style>
</head>
<body>
  <div class="wrap wrap-landing" id="mainWrap">
    <section class="landing" id="landing">
      <img class="landing-image" src="assets/cats/cover.gif" alt="Reborn as a cat" />
      <h2 class="landing-title">Which Cat you are? </h2>
      <p class="landing-sub">แบบทดสอบสั้น ๆ ดูว่าคาแรกเตอร์คุณเหมือนแมวสายไหน</p>
      <button class="start-btn" id="startBtn">เริ่มเลย</button>
    </section>

    <section class="head" id="quizHead" style="display:none;">
      <div class="progress">
        <div class="bar" id="bar">
          <div class="cat-runner" id="catRunner">
            <svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
              <g>
                <!-- หู -->
                <rect x="1" y="0" width="2" height="2" fill="#1a1a1a"/>
                <rect x="9" y="0" width="2" height="2" fill="#1a1a1a"/>
                <!-- หัวกลม -->
                <rect x="1" y="1" width="10" height="1" fill="#1a1a1a"/>
                <rect x="0" y="2" width="12" height="6" fill="#1a1a1a"/>
                <rect x="1" y="8" width="10" height="1" fill="#1a1a1a"/>
                <!-- ตา -->
                <rect x="2" y="4" width="2" height="2" fill="#f5c842"/>
                <rect x="8" y="4" width="2" height="2" fill="#f5c842"/>
                <!-- จมูก/ปาก -->
                <rect x="5" y="6" width="2" height="1" fill="#A79A8A"/>
              </g>
            </svg>
          </div>
        </div>
      </div>
    </section>

    <section class="card" id="quizCard" style="display:none;">
      <div class="q-no" id="qNo"></div>
      <h2 class="q-title" id="qTitle"></h2>

      <!-- อนาคต: ถ้าข้อไหนมีรูป ใส่ path ใน data.image -->
      <img id="qImage" class="question-image" alt="question image" />

      <div id="options"></div>

      <div class="actions">
        <button class="btn btn-back" id="backBtn">ย้อนกลับ</button>
        <button class="btn btn-next" id="nextBtn" disabled>ถัดไป</button>
      </div>
    </section>

    <section id="result" class="result"></section>
  </div>

  <script>
    const questions = [
      { q:"เวลาเครียดที่สุด คุณมักจะ…", image:"", opts:{A:"หายไปอยู่คนเดียว",B:"หาอะไรอร่อยกิน",C:"ระบายออกทันที",D:"หาใครสักคนอยู่ข้าง ๆ"} },
      { q:"ถ้ามีคนมาชมคุณต่อหน้า คุณจะ…", image:"", opts:{A:"เขินจนทำตัวไม่ถูก",B:"รับคำชมเต็มที่",C:"แกล้งกวนกลับ",D:"ทำเป็นไม่สนใจ"} },
      { q:"คุณชอบคนแบบไหนมากที่สุด", image:"", opts:{A:"คนอบอุ่น",B:"คนตลก",C:"คนลึกลับน่าค้นหา",D:"คนที่เข้าใจเราโดยไม่ต้องพูดเยอะ"} },
      { q:"ถ้าเลือกที่นอนในบ้านได้ คุณจะเลือก…", image:"", opts:{A:"เตียงนุ่ม ๆ",B:"ริมหน้าต่าง",C:"มุมแปลก ๆ ที่ไม่มีใครคิดถึง",D:"ใกล้คนที่รัก"} },
      { q:"ในกลุ่มเพื่อน คุณมักเป็น…", image:"", opts:{A:"คนเงียบแต่ฟังทุกอย่าง",B:"ตัวสร้างเสียงหัวเราะ",C:"คนชอบแกล้งคนอื่น",D:"คนคอยดูแลเพื่อน"} },
      { q:"ถ้ามีคนทำให้เสียใจ คุณจะ…", image:"", opts:{A:"เก็บไว้คนเดียว",B:"พยายามลืมเร็ว ๆ",C:"ประชดกลับ",D:"แอบร้องไห้ตอนอยู่คนเดียว"} },
      { q:"คุณชอบบรรยากาศแบบไหน", image:"", opts:{A:"ฝนตก เงียบ ๆ",B:"คาเฟ่คึกคัก",C:"กลางคืนและไฟเมือง",D:"บ้านที่มีคนรออยู่"} },
      { q:"ถ้าเป็นแมว คุณคิดว่าตัวเองจะ…", image:"", opts:{A:"นอนทั้งวัน",B:"วิ่งเล่นไม่หยุด",C:"เดินเชิด ๆ ไม่สนใคร",D:"ติดเจ้าของแจ"} },
      { q:"เวลาเริ่มชอบใคร คุณจะ…", image:"", opts:{A:"แอบมอง",B:"เข้าหาก่อน",C:"ชอบแกล้งเขา",D:"ดูแลแบบเนียน ๆ"} },
      { q:"คุณกลัวอะไรมากที่สุด", image:"", opts:{A:"การถูกทอดทิ้ง",B:"ความน่าเบื่อ",C:"การเสียศักดิ์ศรี",D:"การไม่มีใครเข้าใจ"} },
      { q:"ถ้ามีวันหยุด 1 วันเต็ม คุณจะ…", image:"", opts:{A:"นอนพัก",B:"ออกไปเที่ยว",C:"หาอะไรใหม่ ๆ ทำ",D:"ใช้เวลากับคนสำคัญ"} },
      { q:"ถ้าคนรักงอนคุณ คุณจะ…", image:"", opts:{A:"ง้อเงียบ ๆ",B:"ซื้อของอร่อยให้",C:"แกล้งหยอกจนเขาหายงอน",D:"กอดก่อนเลย"} },
    ];

    const mainResults = {

      qTitle.textContent = item.q;

      bar.style.width = `${((current + 1) / questions.length) * 100}%`;

      `).join("");

      requestAnimationFrame(() => quizCard.classList.add("question-anim"));

      backBtn.disabled = current === 0;
      backBtn.style.visibility = current === 0 ? "hidden" : "visible";
      highlightSelected();

    function highlightSelected(){
      const selected = answers[current];
      document.querySelectorAll(".opt").forEach(btn => {

      });
    }

    options.addEventListener("click",(e)=>{
      const btn = e.target.closest(".opt");
      if(!btn || isTransitioning) return;
      isTransitioning = true;
      answers[current] = btn.dataset.choice;
      btn.animate(
        [{ transform: "scale(1)" }, { transform: "scale(0.985)" }, { transform: "scale(1)" }],

      highlightSelected();
      quizCard.classList.remove("question-anim");
      quizCard.classList.add("question-exit");

          renderQuestion();
          isTransitioning = false;

      const secondScore = sorted[1][1];

      let out;
      let resultKey;
      if(topScore === secondScore){
        const pair = [sorted[0][0], sorted[1][0]].sort().join("+");

        resultKey = tieResults[pair] ? pair : topKey;

  <canvas id="sparkleCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:1000;"></canvas>
  <script>
    (function(){
      const canvas = document.getElementById('sparkleCanvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let animId = null;

      function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize);
      resize();

      const COLORS = ['#f5c842','#f7d86b','#ffe066','#ffd700','#fff176','#ffec40'];
      const SHAPES = ['star','star','star','circle','diamond'];

      let _cx = window.innerWidth/2, _cy = window.innerHeight/2;

      function createParticles(cx, cy){
        particles = [];
        cx = cx || window.innerWidth / 2;
        cy = cy || window.innerHeight / 2;
        for(let i = 0; i < 90; i++){
          const angle = (Math.PI * 2 / 90) * i + (Math.random() - 0.5) * 0.5;
          const speed = 1.5 + Math.random() * 5.5;
          const size  = 4 + Math.random() * 10;
          particles.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
            alpha: 0.75,
            decay: 0.003 + Math.random() * 0.004,
            gravity: 0.02 + Math.random() * 0.02,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.1,
          });
        }
      }

      function drawStar(ctx, x, y, r, rot){
        ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
        ctx.beginPath();
        for(let i=0;i<5;i++){
          const a = (Math.PI*2/5)*i - Math.PI/2;
          const b = a + Math.PI/5;
          ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
          ctx.lineTo(Math.cos(b)*r*0.4, Math.sin(b)*r*0.4);
        }
        ctx.closePath(); ctx.fill(); ctx.restore();
      }

      function loop(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        let alive = false;
        for(const p of particles){
          if(p.alpha <= 0) continue;
          alive = true;
          p.x += p.vx; p.y += p.vy;
          p.vy += p.gravity;
          p.vx *= 0.98;
          p.alpha -= p.decay;
          p.rotation += p.rotSpeed;
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.fillStyle = p.color;
          if(p.shape === 'star'){
            drawStar(ctx, p.x, p.y, p.size, p.rotation);
          } else if(p.shape === 'circle'){
            ctx.beginPath(); ctx.arc(p.x,p.y,p.size*0.5,0,Math.PI*2); ctx.fill();
          } else {
            ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rotation);
            ctx.beginPath();
            ctx.moveTo(0,-p.size*0.6); ctx.lineTo(p.size*0.4,0);
            ctx.lineTo(0,p.size*0.6); ctx.lineTo(-p.size*0.4,0);
            ctx.closePath(); ctx.fill(); ctx.restore();
          }
        }
        ctx.globalAlpha = 1;
        if(alive) animId = requestAnimationFrame(loop);
        else particles = [];
      }

      window.triggerSparkle = function(targetEl){
        if(animId){ cancelAnimationFrame(animId); animId = null; }
        // center on target element if provided
        if(targetEl){
          const rect = targetEl.getBoundingClientRect();
          _cx = rect.left + rect.width / 2;
          _cy = rect.top + rect.height / 2;
        } else {
          _cx = window.innerWidth / 2;
          _cy = window.innerHeight / 2;
        }
        createParticles(_cx, _cy);
        loop();
      };
    })();
  </script>
